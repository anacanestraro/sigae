{% extends 'base.html' %}
{% block content %}
<div class="bg-white rounded shadow p-6 max-w-lg">
  <h2 class="text-xl font-bold text-blue-900 mb-4">Editar Perfil</h2>

  <form method="post" class="space-y-4">
    {% csrf_token %}
    {% for field in form %}
    <div>
      <label class="block text-sm text-gray-600 mb-1">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}
      <p class="text-red-500 text-sm mt-1">{{ field.errors.0 }}</p>
      {% endif %}
    </div>
    {% endfor %}

    <button type="submit"
            class="bg-blue-900 text-white px-4 py-2 rounded w-full">
      Salvar
    </button>
  </form>
</div>
{% endblock %}
